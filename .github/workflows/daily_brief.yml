name: Daily Financial Brief

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync with remote before generating
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin master
          git reset --hard origin/master

      - name: Generate report
        working-directory: src/daily_brief
        run: python main.py --no-email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: Build archive index
        working-directory: src/daily_brief
        run: python build_index.py

      - name: Commit and push report
        run: |
          git add docs/
          git diff --staged --quiet || git commit -m "report: $(date -u +%Y-%m-%d)"
          git push origin master

      - name: Wait for GitHub Pages deployment
        run: sleep 90

      - name: Send email notification
        working-directory: src/daily_brief
        run: python send_notification.py
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

      - name: Send failure notification
        if: failure()
        working-directory: src/daily_brief
        run: python send_notification.py failure
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
